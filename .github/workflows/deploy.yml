name: Deploy SNZ Education to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect app directory
        id: appdir
        shell: bash
        run: |
          if [ -f "frontend/package.json" ]; then
            echo "dir=frontend" >> "$GITHUB_OUTPUT"
            echo "Detected React app in: frontend/"
          elif [ -f "package.json" ]; then
            echo "dir=." >> "$GITHUB_OUTPUT"
            echo "Detected React app at: repo root"
          else
            echo "::error::No package.json found at repo root or in frontend/"
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: ${{ steps.appdir.outputs.dir }}
        run: |
          if [ -f yarn.lock ]; then
            corepack enable
            yarn install --frozen-lockfile
          elif [ -f package-lock.json ]; then
            npm ci --legacy-peer-deps
          else
            npm install --legacy-peer-deps
          fi

      - name: Build
        working-directory: ${{ steps.appdir.outputs.dir }}
        env:
          CI: false
          DISABLE_ESLINT_PLUGIN: true
          REACT_APP_BACKEND_URL: ""
        run: |
          if [ -f yarn.lock ]; then
            yarn build
          else
            npm run build
          fi

      - name: Copy index.html to 404.html (SPA fallback)
        run: cp ${{ steps.appdir.outputs.dir }}/build/index.html ${{ steps.appdir.outputs.dir }}/build/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.appdir.outputs.dir }}/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
